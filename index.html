<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha Conta</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0a0a;color:#fff;padding:0 0 40px;overflow-x:hidden}
.container{max-width:500px;margin:0 auto;padding:0 16px}
.abas{display:flex;background:#0f0f0f;border-bottom:1px solid #1a1a00;position:sticky;top:0;z-index:99;overflow-x:auto;scroll-behavior:smooth}
.aba{flex-shrink:0;padding:14px 12px;text-align:center;font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:#333;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap}
.aba.ativa{color:#d4af37;border-bottom-color:#d4af37}
.tela{display:none;padding-top:20px}
.tela.ativa{display:block}
.topo-titulo{font-family:'Bebas Neue',sans-serif;font-size:13px;letter-spacing:4px;color:#8a7040;text-transform:uppercase;text-align:center;padding:4px 0 16px}
.hero-box{background:#0f0f0f;border:1px solid #2a2200;border-radius:20px;padding:28px 24px;text-align:center;margin-bottom:20px;position:relative;overflow:hidden}
.hero-box::before{content:'';position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:300px;height:160px;background:radial-gradient(ellipse,rgba(212,175,55,0.12) 0%,transparent 70%);pointer-events:none}
.hero-label{font-size:11px;letter-spacing:3px;color:#5a4a20;text-transform:uppercase;margin-bottom:10px;font-weight:600}
.hero-valor{font-family:'Bebas Neue',sans-serif;font-size:52px;letter-spacing:2px;background:linear-gradient(135deg,#f5d060,#d4af37,#a07820);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:12px}
.hero-editar{display:flex;gap:8px;align-items:center;justify-content:center}
.hero-editar input{background:#0a0a0a;border:1px solid #2a2000;color:#e8d5a0;padding:10px 14px;border-radius:10px;font-size:16px;font-weight:800;width:160px;text-align:center;font-family:'Inter',sans-serif}
.hero-editar input:focus{outline:none;border-color:#d4af37}
.hero-editar button{background:linear-gradient(135deg,#f5d060,#d4af37);color:#0a0a0a;border:none;border-radius:10px;padding:10px 16px;font-weight:800;font-size:13px;cursor:pointer}
.resumo{display:flex;gap:12px;margin-bottom:20px}
.resumo-card{flex:1;background:#0f0f0f;border-radius:14px;padding:14px;text-align:center;border:1px solid #1a1a1a}
.resumo-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;font-weight:600}
.resumo-valor{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px}
.resumo-card.verde .resumo-label{color:#1a5c3a}
.resumo-card.verde .resumo-valor{color:#22c97a}
.resumo-card.vermelho .resumo-label{color:#5c1a1a}
.resumo-card.vermelho .resumo-valor{color:#e25c5c}
.resumo-card.amarelo .resumo-label{color:#5a4a00}
.resumo-card.amarelo .resumo-valor{color:#d4af37}
.resumo-card.roxo .resumo-label{color:#3a0a4a}
.resumo-card.roxo .resumo-valor{color:#a855f7}
.barra-box{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:14px;padding:16px;margin-bottom:20px}
.barra-label{font-size:10px;letter-spacing:2px;color:#3a3020;text-transform:uppercase;font-weight:600;margin-bottom:10px}
.barra-bg{background:#1a1a1a;border-radius:6px;height:10px}
.barra-fill{height:10px;border-radius:6px;background:linear-gradient(90deg,#22c97a,#d4af37,#e25c5c);transition:width 0.4s}
.barra-info{display:flex;justify-content:space-between;margin-top:8px;font-size:11px;color:#444}
.form-box{background:#0f0f0f;border:1px solid #1e1800;border-radius:20px;padding:20px;margin-bottom:20px}
.tipo-btns{display:flex;gap:8px;margin-bottom:16px}
.tipo-btns button{flex:1;padding:13px;border:1px solid #1a1a1a;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;letter-spacing:1px;background:#0a0a0a;color:#333;transition:all 0.2s;text-transform:uppercase}
.tipo-btns button.active-entrada{background:#0a2a1a;border-color:#22c97a;color:#22c97a}
.tipo-btns button.active-saida{background:#2a0a0a;border-color:#e25c5c;color:#e25c5c}
.campos{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.campos input{background:#0a0a0a;border:1px solid #1e1800;color:#e8d5a0;padding:13px 12px;border-radius:12px;font-size:14px;font-family:'Inter',sans-serif}
.campos input::placeholder{color:#2a2010}
.campos input:focus{outline:none;border-color:#d4af37}
.inp-emoji{width:52px;text-align:center;font-size:20px}
.inp-desc{flex:1;min-width:120px}
.inp-valor{width:110px;font-weight:800}
.inp-parc{width:80px}
.btn-lancar{width:100%;padding:15px;border:none;border-radius:14px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;cursor:pointer;background:linear-gradient(135deg,#f5d060,#d4af37,#a07820);color:#0a0a0a;margin-top:4px}
.lista-titulo{font-size:10px;letter-spacing:3px;color:#3a3020;text-transform:uppercase;font-weight:600;margin:24px 0 12px;padding-left:4px}
.lista{display:flex;flex-direction:column;gap:8px}
.item{background:#0f0f0f;padding:14px 16px;border-radius:14px;display:flex;align-items:center;gap:12px;border:1px solid #1a1a1a}
.item.entrada{border-left:3px solid #22c97a}
.item.saida{border-left:3px solid #e25c5c}
.item.cartao{border-left:3px solid #d4af37}
.item.fixa{border-left:3px solid #a855f7}
.item.variavel{border-left:3px solid #06b6d4}
.item.confirmar{background:#1a0505;border-color:#3a0a0a}
.item-emoji{font-size:22px;width:32px;text-align:center}
.item-info{flex:1}
.item-desc{font-size:14px;font-weight:700;color:#e8d5a0}
.item-sub{font-size:11px;color:#2a2010;margin-top:3px;letter-spacing:0.5px}
.item-valor{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:1px;color:#e25c5c;white-space:nowrap}
.item-valor.verde{color:#22c97a}
.btn-del{background:#1a1a1a;border:none;color:#333;width:30px;height:30px;border-radius:8px;font-size:15px;cursor:pointer;flex-shrink:0}
.btn-del.confirmar{background:#3a0a0a;color:#e25c5c}
.vazio{text-align:center;color:#2a2010;padding:40px 0;font-size:14px;letter-spacing:1px}
.total-box{background:#0f0f0f;border:1px solid #2a1a4a;border-radius:14px;padding:16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center}
.total-box.roxo{border-color:#2a1a4a}
.total-box.roxo .total-label{color:#6a3a9a}
.total-box.roxo .total-valor{color:#a855f7}
.total-box.ciano{border-color:#1a2a3a}
.total-box.ciano .total-label{color:#3a6a8a}
.total-box.ciano .total-valor{color:#06b6d4}
.total-label{font-size:11px;letter-spacing:2px;text-transform:uppercase;font-weight:600}
.total-valor{font-family:'Bebas Neue',sans-serif;font-size:28px}
.assinatura{text-align:center;padding:40px 0 10px}
.assinatura-linha{font-size:10px;letter-spacing:3px;color:#2a2010;text-transform:uppercase;margin-bottom:4px}
.assinatura-nome{font-family:'Bebas Neue',sans-serif;font-size:28px;letter-spacing:4px;background:linear-gradient(135deg,#f5d060,#d4af37,#a07820);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
</style>
</head>
<body>

<div class="abas">
  <div class="aba ativa" onclick="trocarAba('conta')">💰 CONTA</div>
  <div class="aba" onclick="trocarAba('cartao')">💳 CARTÃO</div>
  <div class="aba" onclick="trocarAba('fixas')">📌 FIXAS</div>
  <div class="aba" onclick="trocarAba('variavel')">📊 VARIÁVEL</div>
</div>

<!-- ABA CONTA -->
<div class="tela ativa" id="tela-conta">
<div class="container">
  <div class="topo-titulo">Controle de Conta</div>
  <div class="hero-box">
    <div class="hero-label">Saldo atual</div>
    <div class="hero-valor" id="saldo">R$ 0,00</div>
    <div class="hero-editar">
      <input type="number" id="novoSaldo" placeholder="Ajustar saldo" step="0.01">
      <button onclick="ajustarSaldo()">OK</button>
    </div>
  </div>
  <div class="resumo">
    <div class="resumo-card verde">
      <div class="resumo-label">Entrou</div>
      <div class="resumo-valor" id="totalEntrada">R$ 0</div>
    </div>
    <div class="resumo-card vermelho">
      <div class="resumo-label">Saiu</div>
      <div class="resumo-valor" id="totalSaida">R$ 0</div>
    </div>
  </div>
  <div class="form-box">
    <div class="tipo-btns">
      <button id="btnEntrada" class="active-entrada" onclick="setTipo('entrada')">↑ Entrada</button>
      <button id="btnSaida" onclick="setTipo('saida')">↓ Saída</button>
    </div>
    <div class="campos">
      <input type="text" id="emoji" class="inp-emoji" placeholder="😋" maxlength="2">
      <input type="text" id="descricao" class="inp-desc" placeholder="O que foi?">
      <input type="number" id="valor" class="inp-valor" placeholder="0,00" step="0.01">
    </div>
    <button class="btn-lancar" onclick="lancar()">LANÇAR</button>
  </div>
  <div class="lista-titulo">Movimentações</div>
  <div class="lista" id="lista"></div>
  <div class="assinatura">
    <div class="assinatura-linha">feito por</div>
    <div class="assinatura-nome">Gustavo Dantas</div>
  </div>
</div>
</div>

<!-- ABA CARTÃO -->
<div class="tela" id="tela-cartao">
<div class="container">
  <div class="topo-titulo">Cartão de Crédito</div>
  <div class="hero-box">
    <div class="hero-label">Limite disponível</div>
    <div class="hero-valor" id="cDisponivel">R$ 0,00</div>
    <div class="hero-editar">
      <input type="number" id="cLimite" placeholder="Definir limite" step="0.01">
      <button onclick="ajustarLimite()">OK</button>
    </div>
  </div>
  <div class="resumo">
    <div class="resumo-card amarelo">
      <div class="resumo-label">Limite</div>
      <div class="resumo-valor" id="cLimiteTotal">R$ 0</div>
    </div>
    <div class="resumo-card vermelho">
      <div class="resumo-label">Usado</div>
      <div class="resumo-valor" id="cUsado">R$ 0</div>
    </div>
  </div>
